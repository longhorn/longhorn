---
apiVersion: v1
kind: Secret
metadata:
  name: longhorn-crypto
  namespace: longhorn-system
stringData:
  CRYPTO_KEY_VALUE: "Simple passphrase"
  CRYPTO_KEY_PROVIDER: "secret" # this is optional we currently only support direct keys via secrets
  CRYPTO_KEY_CIPHER: "aes-cbc-essiv:sha256" # this is optional, default value for RHEL
  CRYPTO_KEY_HASH: "sha256" # this is optional, default value
  CRYPTO_KEY_SIZE: "256" # this is optional, default value
  # PBKDF configuration
  CRYPTO_PBKDF: "pbkdf2" # Only PBKDF2 is supported in FIPS mode, needs to be set on RHEL7
  # Force PBKDF2 iteration count for encryption key derivation.
  # In FIPS mode, PBKDF2 is the only supported KDF, so iteration count is the primary factor for resisting brute-force attacks.
  #
  # 200000 is chosen to balance:
  # - Security: above common minimum recommendations (~100k)
  # - Performance: avoids excessive volume attach latency in Longhorn
  #   (e.g., replica rebuild, engine restart, volume attach paths)
  #CRYPTO_PBKDF_FORCE_ITERATIONS: "200000" # optional

  # Memory cost for PBKDF.
  # Not applicable to PBKDF2 (only relevant for memory-hard KDFs like argon2/scrypt, which are not allowed in FIPS mode).
  #
  # Set to "0" to make the behavior explicit and avoid confusion.
  #CRYPTO_PBKDF_MEMORY: "0" # optional